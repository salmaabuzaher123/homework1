<!DOCTYPE html>
<!--
Program name: patient-form.html
Author: Salma Abuzaher
Date created: 02/24/2026
Date last edited: 02/27/2026
Version: 1.0
Description: This document creates a patient registration form.
-->
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css"> <!-- links to the css file-->

    <!--display text in the tab-->
    <title>Patient Registration Form | TP Medical</title>
  </head>
  <body>
    <header>
      <table width="100%">
        <tr>
          <td valign="top" align="left" width="20%">
            <div class="image">
              <img align="center" src="TPlogo.png" alt="TP Medical Services Logo" width="70px" id="logo"/>
            </div>
          </td>

          <td>
            <h2>TP Medical Services</h2>
          </td>

          <td valign="bottom" align="right" width="20%">
            Today's Date: <span id="today"></span>
          </td>
        </tr>
      </table>
    </header>
<hr>
<!-- Form starts here-->
<form action="thankyou.html">
  <center>
    <div class="format">
      <table>
        <tr>
          <th colspan="4"> Create Patient Account</th>
        </tr>
        <!-- Patient's name -->
        <tr>
          <td class="td1"><label for="fname">First Name:</label></td>
          <td>
            <input type="text"
            name="fname"
            id="fname"
            maxlength="30"
            title="Please enter your first name"
            required
            />
          </td>
        </tr>
        <tr>
          <td class="td1"><label for="mname">Middle Initial:</label></td>
          <td>
            <input type="text"
            name="mname"
            id="mname"
            maxlength="1"
            title="Please enter your middle initial"
            />
          </td>
        </tr>
        <tr>
          <td class="td1"><label for="lname">Last Name:</label></td>
          <td>
            <input type="text"
            name="lname"
            id="lname"
            maxlength="30"
            title="Please enter your last name"
            required
            />
          </td>
        </tr>

        <!-- Gender-->

        <tr>
          <td class="td1"><label for="psex">Patient's Sex</label></td>
          <td>
            <input
            type="radio"
            id="s1"
            name="psex"
            value="Male"
            />
            Male

            <input
            type="radio"
            id="s2"
            name="psex"
            value="Female"
            />
            Female

            <input
            type="radio"
            id="s3"
            name="psex"
            value="Other"
            />
            Other
          </td>
        </tr>

        <!--Date of birth-->

        <tr>
          <td class="td1"><label for="dob">Date of birth</label></td>
          <td>
            <input
            type="date"
            id="dob"
            name="DOB"
            required
            />
          </td>
        </tr>

        <!-- Social Security number-->

        <tr>
          <td class="td1"><label for="ssn">ssn</label></td>
          <td>
            <input
            type="password" 
            minlength="9"
            maxlength="11"
            name="ssn"
            id="ssn"
            required
            title="Please enter your social security number"
            />
          </td>
        </tr>

        <tr>
          <th colspan="4"><hr></th> <!-- This makes a line for space-->
        </tr>

        <tr>
          <th colspan="4">Patient contact information</th>
        </tr>

        <!--Address-->

        <tr>
          <td class="td1"><label for="address1">Address:</label></td>
          <td>
            <input type="text"
            name="address1"
            id="address1"
            maxlength="30"
            title="Please enter your address"
            required
            />
          </td>
        </tr>
        
        <tr>
          <td class="td1"><label for="address2">Address:</label></td>
          <td>
            <input type="text"
            name="address2"
            id="address2"
            maxlength="30"
            title="Please enter your address"
            />
          </td>
        </tr>

        <tr>
          <td class="td1"><label for="city">City:</label></td>
          <td>
            <input type="text"
            name="city"
            id="city"
            maxlength="30"
            title="Please enter your city"
            required
            />
          </td>
        </tr>

        <!--All the states including DC and PR-->
        <tr>
          <td><label for="state">State:</label></td>
          <td>
            <select>
              <option selected disabled>Please Select One</option>
              <option value="AL">Alabama</option>
              <option value="AK">Alaska</option>
              <option value="AZ">Arizona</option>
              <option value="AR">Arkansas</option>
              <option value="CA">California</option>
              <option value="CO">Colorado</option>
              <option value="CT">Connecticut</option>
              <option value="DE">Delaware</option>
              <option value="DC">District of Columbia</option>
           <option value="FL">Florida</option>
           <option value="GA">Georgia</option>
           <option value="GU">Guam</option>	
           <option value="HI">Hawaii</option>	
           <option value="ID">Idaho</option>	
           <option value="IL">Illinois</option>	
           <option value="IN">Indiana</option>	
           <option value="IA">Iowa</option>	
           <option value="KS">Kansas</option>	
           <option value="KY">Kentucky</option>	
           <option value="LA">Louisiana</option>	
           <option value="ME">Maine</option>	
           <option value="MD">Maryland</option>	
           <option value="MA">Massachusetts</option>	
           <option value="MI">Michigan</option>	
           <option value="MN">Minnesota</option>	
           <option value="MS">Mississippi</option>	
           <option value="MO">Missouri</option>
           <option value="MT">Montana</option>
           <option value="NE">Nebraska</option>
           <option value="NV">Nevada</option>	
           <option value="NH">New Hampshire</option>	
           <option value="NJ">New Jersey</option>	
           <option value="NM">New Mexico</option>	
           <option value="NY">New York</option>	
           <option value="NC">North Carolina</option>	
           <option value="ND">North Dakota</option>	
           <option value="OH">Ohio</option>	
           <option value="OK">Oklahoma</option>	
           <option value="OR">Oregon</option>	
           <option value="PA">Pennsylvania</option>	
           <option value="PR">Puerto Rico</option>	
           <option value="RI">Rhode Island</option>	
           <option value="SC">South Carolina</option>	
           <option value="SD">South Dakota</option>	
           <option value="TN">Tennessee</option>	
           <option value="TX">Texas</option>	
           <option value="UT">Utah</option>	
           <option value="VT">Vermont</option>	
           <option value="VA">Virginia</option>	
           <option value="WA">Washington</option>	
           <option value="WV">West Virginia</option>	
           <option value="WI">Wisconsin</option>	
           <option value="WY">Wyoming</option>
            </select>
          </td>
        <td>
        <td class="td1"><label for="zipcode">Zip Code:</label></td>
          <td>
            <input type="text"
            name="zipcode"
            id="zipcode"
            minlength="5"
            maxlength="10"
            pattern="[0-9]{5}"
            title="Please enter your zip code"
            required
            />
          </td>
        </tr>

        <tr>
          <td class="td1"><label for="email">Email:</label></td>
            <td>
              <input type="text"
              name="email"
              id="email"
              required
              maxlength="30"
              title="Please enter your email"
              placeholder=tpmedical@gmail.com
              />
            </td>
        </tr>

        <tr>
          <td class="td1"><label for="phonenum">Phone Number:</label></td>
            <td>
              <input type="text"
              name="phonenum"
              id="phonenum"
              pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
              required
              maxlength="30"
              title="Please enter your phone number"
              placeholder="123-456-7890"
              />
            </td>
        </tr>

        <tr>
          <th colspan="4"><hr></th>
        </tr>

        <!--Patient Background Info-->

        <tr>
          <th colspan="4">Patient's History</th>
        </tr>

        <tr>
          <td class="td1"><label for="vaccinated">Have you been vaccinated:</label></td>
          <td>
            <input type="radio"
            id="v1"
            name="vaccinated"
            value="Yes"
            />
            Yes
            <input type="radio"
            id="v2"
            name="vaccinated"
            value="No"
            />
            No
          </td>
        </tr>

        <tr>
          <td class="td1"><label for="primary">Do you have a primary care provider:</label></td>
          <td>
            <input type="radio"
            id="p1"
            name="primary"
            value="Yes"
            />
            Yes
            <input type="radio"
            id="p2"
            name="primary"
            value="No"
            />
            No
          </td>
        </tr>

        <tr>
          <td class="td1"><label for="patient_hist">Do you have any of the following conditions:</label></td>
          <td>
            <input type="checkbox" id="option1" value="Diabetes"/>
            <label for="diabetes">Diabetes</label>

            <input type="checkbox" id="option2" value="High blood pressure"/>
            <label for="high blood pressure">High Blood Pressure</label>

            <input type="checkbox" id="option3" value="Heart Disease"/>
            <label for="heart disease">Heart Disease</label>

            <input type="checkbox" id="option4" value="Asthma"/>
            <label for="asthma">Asthma</label>

            <input type="checkbox" id="option5" value="Cancer"/>
            <label for="cancer">Cancer</label>

            <input type="checkbox" id="option6" value="Other"/>
            <label for="other">Other</label>
        </tr>

        <tr>
          <td class="td1" align="right">
            <label for="notes">Describe your reason for visit:</label>
          </td>
          <td>
            <textarea
            rows="3"
            cols="50"
            maxlength="500"
            id="notes"
            name="notes"
            title="Please describe any symptoms you are experiencing"
            placeholder="(Insert text here)"
            ></textarea>
            <span id="description_text"></span>
          </td>  
        </tr>

        <!--Slider HTML-->
        <tr>
          <td class="td1"><label for="range">Rate your current pain level<br/>(On a scale of 0-10, 10 being extreme pain)</label></td>
          <td>
            <input type="range"
            name="range"
            id="range"
            min="0"
            max="10"
            value="0"
            />
            <span id="range_slider"></span>
          </td>
        </tr>

        <tr>
          <th colspan="4"><hr></th>
        </tr>

        <!--Patient Account-->
        <tr>
          <th colspan="4">Make an Account:</th>
        </tr>

        <tr>
          <td class="td1"><label for="username">Username:</label></td>
          <td>
            <input type="text"
            name="username"
            id="username"
            maxlength="20"
            required
            title="Please enter your username"
            />
          </td>
        </tr>

        <tr>
          <td class="td1"><label for="password">Password:</label></td>
          <td>
            <input type="password"
            name="password"
            id="password"
            minlength="10"
            maxlength="30"
            required
            title="Please enter your password"
          </td>
        </tr>

        <tr>
          <td class="td1"><label for="confirm">Confirm Password:</label></td>
          <td>
            <input type="password"
            name="confirm"
            id="confirm"
            minlength="10"
            maxlength="30"
            required
            title="Please re-enter your password"
          </td>
        </tr>

        <tr>
          <td class="td1" colspan="4">
          <center>
            <input type="submit" name="submit" id="submit" style="font-family: Helvetica, sans-serif, monospace;">
            &nbsp;&nbsp;&nsbp; <!--spaces-->
            <input type="reset" name="reset" id="reset" style="font-family: Helvetica, sans-serif, monospace;">
          </center>
          </td>
        </tr>
      </table>
    </div>
  </center>
</form>

<!--Footer-->

</div>

<script src="hw1.js"></script>
    
  </body>
</html>
